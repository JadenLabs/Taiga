# ───── Permanent Upgrades ─────
# Bought with golden beans via /upgrades. These survive prestige.
# effect types: multiplier | collect_cap | cooldown_floor | auto_collect | head_start | lucky
# cost for a level = round(base_cost * cost_growth ** current_level)

[[permanent_upgrades]]
name = "golden_paws"
description = "Taiga's blessing. +25% bean multiplier, forever."
emoji = "🐾"
base_cost = 1
cost_growth = 1.5
max_level = 0          # 0 = unlimited
effect = "multiplier"
effect_value = 0.25

[[permanent_upgrades]]
name = "deep_pantry"
description = "Generators store +12hrs of beans before overflowing."
emoji = "📦"
base_cost = 2
cost_growth = 2.0
max_level = 4
effect = "collect_cap"
effect_value = 12     # hours per level

[[permanent_upgrades]]
name = "eternal_energy"
description = "Lowers the pet cooldown floor by 10min per level."
emoji = "⏱️"
base_cost = 2
cost_growth = 1.8
max_level = 5
effect = "cooldown_floor"
effect_value = 600    # seconds per level

[[permanent_upgrades]]
name = "auto_collect"
description = "Your generators never stop — removes the storage cap entirely."
emoji = "🤖"
base_cost = 5
cost_growth = 1.0
max_level = 1
effect = "auto_collect"
effect_value = 1

[[permanent_upgrades]]
name = "head_start"
description = "Keep +5% of your beans through prestige."
emoji = "🍼"
base_cost = 1
cost_growth = 2.0
